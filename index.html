<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<link rel="shortcut icon" href="./superMario.png" type="image/x-icon">
<title>Super Claude - by Tanver Fahat</title>
</head>
<body>

<h1>Super Claude</h1>
<div id="devCredit">Developed by Tanver Fahat</div>

<div id="hud">
  <div><span>SCORE: </span><b id="sScore">0</b></div>
  <div><span>COINS: </span><b id="sCoins">0</b></div>
  <div><span>LIVES: </span><b id="sLives">3</b></div>
  <div><span>WORLD: </span><b id="sWorld">1</b></div>
  <div><span>TIME: </span><b id="sTime">200</b></div>
</div>

<div id="worldTag" id="worldTag">Select a world to begin</div>

<div id="canvasWrap">
  <canvas id="c" width="640" height="360"></canvas>
  <div id="overlay">
    <h2>SUPER CLAUDE</h2>
    <p>Arrow / WASD to move &nbsp;|&nbsp; SPACE / UP to jump<br>
       Stomp enemies! Collect coins! Reach the flag!</p>
    <div id="worldSelect">
      <button class="wb" style="background:#3a7a00;border-color:#5aaa10;" onclick="startGame(0)">
         World 1<br><small style="color:#aaffaa">Grassland</small>
      </button>
      <button class="wb" style="background:#4a3010;border-color:#8a6030;" onclick="startGame(1)">
         World 2<br><small style="color:#ffcc88">Underground</small>
      </button>
      <button class="wb" style="background:#a06010;border-color:#e08820;" onclick="startGame(2)">
         World 3<br><small style="color:#ffe090">Desert</small>
      </button>
      <button class="wb" style="background:#1a0a3a;border-color:#6030a0;" onclick="startGame(3)">
         World 4<br><small style="color:#cc88ff">Night Castle</small>
      </button>
    </div>
    <p style="margin-top:4px;font-size:9px;color:#666;">Developed by Tanver Fahat</p>
  </div>
</div>

<div id="btns">
  <button id="bL">◀ Left</button>
  <button id="bJ">▲ Jump</button>
  <button id="bR">Right ▶</button>
</div>
<div id="footer">© Tanver Fahat — Super Claude v2.0 | 4 Worlds</div>
<script src="./script.js"></script>

</body>
</html>
